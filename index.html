<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASH - PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,html{
  height:100%;
  font-family:'Poppins',sans-serif;
  color:#fff;
  overflow:hidden;
}

/* 🎥 Background */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{
  height:100%;
  overflow-y:auto;
  display:flex;
  justify-content:center;
  padding:60px 20px;
}

.card{
  max-width:850px;
  width:100%;
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  padding:40px;
  backdrop-filter:blur(15px);
  text-align:center;
}

/* PROFILE */
.profile{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #fff;
  margin-bottom:15px;
}

/* SECTIONS */
.section{
  margin-top:25px;
  text-align:left;
}

/* PLAYER */
.music-box{
  margin-top:30px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

.cover{
  width:120px;
  height:120px;
  border-radius:15px;
}

.song-name{
  margin-top:8px;
  color:#ccc;
}

#visualizer{
  width:100%;
  height:60px;
}

.progress{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#00c6ff;
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#aaa;
}

.play-btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00c6ff;
  color:white;
}

/* 🎵 LYRICS */
.lyrics{
  margin-top:12px;
  font-size:14px;
  color:#ddd;
  min-height:22px;
  text-align:center;
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<audio id="bgMusic" loop>
  <source src="song.mp3">
</audio>

<div class="container">
<div class="card">

<img src="file.png" class="profile">

<h1>YASH</h1>
<p>Hi! I'm Yash — 16 years old student from India 🇮🇳</p>

<div class="section">
<h2>About</h2>
<p>Learning, growing and exploring.</p>
</div>

<div class="section">
<h2>Skills</h2>
<ul>
<li>Creative Thinking</li>
<li>Problem Solving</li>
<li>Self Growth</li>
</ul>
</div>

<a href="https://t.me/YAsHSTARK_18">Contact Me</a>

<!-- 🎧 PLAYER -->
<div class="music-box">

<img src="cover.jpg" class="cover">

<p class="song-name">🎧 Playing: Bairan</p>

<canvas id="visualizer"></canvas>

<div class="progress" onclick="seek(event)">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="time">
  <span id="current">0:00</span>
  <span id="duration">0:00</span>
</div>

<button class="play-btn" onclick="toggleMusic()" id="playBtn">⏸</button>

<div class="lyrics" id="lyrics">🎶 Starting...</div>

</div>

</div>
</div>

<script>
const audio=document.getElementById("bgMusic");
const btn=document.getElementById("playBtn");
const progress=document.getElementById("progressBar");
const current=document.getElementById("current");
const duration=document.getElementById("duration");
const lyricsEl=document.getElementById("lyrics");

// autoplay fix
audio.play().catch(()=>{
  document.addEventListener("click",()=>audio.play(),{once:true});
});

// play pause
function toggleMusic(){
  if(audio.paused){
    audio.play();
    btn.innerText="⏸";
  }else{
    audio.pause();
    btn.innerText="▶";
  }
}

// progress + lyrics
audio.addEventListener("timeupdate",()=>{
  let p=(audio.currentTime/audio.duration)*100;
  progress.style.width=p+"%";
  current.innerText=format(audio.currentTime);
  duration.innerText=format(audio.duration);
  updateLyrics(audio.currentTime);
});

function format(t){
  if(!t) return "0:00";
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  return m+":"+(s<10?"0"+s:s);
}

// seek
function seek(e){
  let r=e.currentTarget.getBoundingClientRect();
  let x=e.clientX-r.left;
  audio.currentTime=(x/r.width)*audio.duration;
}

// 🎵 FULL LYRICS SCRIPT
const lyrics = [
{time:0,text:"🎶 Bairan..."},
{time:6,text:"Tere bina lagta hai dil kahin na lage"},
{time:12,text:"Raaton me bhi tera khayal hi jage"},
{time:18,text:"Saanson me basi hai teri hi baatein"},
{time:24,text:"Dil ye pukare tu hi tu aake"},
{time:30,text:"Bairan si yaadein sataaye mujhe"},
{time:36,text:"Har pal tera ehsaas dilaye mujhe"},
{time:42,text:"Tu hi meri manzil tu hi raasta"},
{time:48,text:"Tujhse hi mera har ek vaasta"},
{time:54,text:"🎶 Bairan... Bairan..."},
{time:60,text:"Dil mera tere naam ka deewana"},
];

function updateLyrics(time){
  for(let i=lyrics.length-1;i>=0;i--){
    if(time>=lyrics[i].time){
      lyricsEl.innerText=lyrics[i].text;
      break;
    }
  }
}

// 🌊 visualizer
const canvas=document.getElementById("visualizer");
const ctx=canvas.getContext("2d");

let audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let analyser=audioCtx.createAnalyser();
let source=audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize=64;
let data=new Uint8Array(analyser.frequencyBinCount);

canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;

function draw(){
  requestAnimationFrame(draw);
  analyser.getByteFrequencyData(data);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let w=canvas.width/data.length;

  for(let i=0;i<data.length;i++){
    let h=data[i]/2;
    ctx.fillStyle="#00c6ff";
    ctx.fillRect(i*w,canvas.height-h,w-2,h);
  }
}
draw();
</script>

</body>
</html>
