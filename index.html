<!DOCTYPE html>
<html>
<head>
<title>ULTRA FPS</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#start{position:absolute;top:40%;width:100%;text-align:center;color:white;font-size:22px;cursor:pointer;}
#ui{position:absolute;top:10px;left:10px;color:white;font-size:18px;}
#crosshair{
 position:absolute;top:50%;left:50%;
 width:12px;height:12px;background:red;
 transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div id="start">CLICK TO START</div>
<div id="ui">❤️ 100 | 🎯 0 | 🔫 READY</div>
<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// ===== SCENE =====
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.y=1.6;

let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.HemisphereLight(0xffffff,0x444444));
let sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

// ===== MAP =====
let ground=new THREE.Mesh(
 new THREE.PlaneGeometry(600,600),
 new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// random buildings
for(let i=0;i<50;i++){
 let size=Math.random()*6+3;
 let b=new THREE.Mesh(
  new THREE.BoxGeometry(size,size,size),
  new THREE.MeshStandardMaterial({color:0x888888})
 );
 b.position.set((Math.random()-0.5)*300,size/2,-Math.random()*300);
 scene.add(b);
}

// ===== CONTROLS =====
let controls=new THREE.PointerLockControls(camera,document.body);
start.onclick=()=>controls.lock();
controls.addEventListener("lock",()=>start.style.display="none");
scene.add(controls.getObject());

// ===== PLAYER =====
let health=100,score=0;
let velocity=new THREE.Vector3();
let velocityY=0,onGround=true;

// ===== INPUT =====
let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// ===== ENEMIES =====
let enemies=[];
function spawnEnemy(){
 let e=new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
 );
 e.position.set((Math.random()-0.5)*250,0.5,-Math.random()*250);
 e.speed=Math.random()*0.03+0.01;
 scene.add(e);
 enemies.push(e);
}
for(let i=0;i<15;i++) spawnEnemy();

// ===== GUN SYSTEM =====
let canShoot=true;
let reloadTime=300;
let status="READY";

let gun=new THREE.Mesh(
 new THREE.BoxGeometry(0.3,0.3,1.2),
 new THREE.MeshStandardMaterial({color:0x111111})
);
gun.position.set(0.5,-0.5,-1);
camera.add(gun);
scene.add(camera);

// ===== SHOOT =====
document.addEventListener("click",()=>{
 if(!controls.isLocked || !canShoot) return;

 canShoot=false;
 status="RELOAD";

 let ray=new THREE.Raycaster();
 ray.setFromCamera({x:0,y:0},camera);

 enemies.forEach((e,i)=>{
   let hit=ray.intersectObject(e);
   if(hit.length>0){
     e.scale.set(0.5,0.5,0.5); // hit effect
     setTimeout(()=>scene.remove(e),100);
     enemies.splice(i,1);
     score+=10;
     spawnEnemy();
   }
 });

 gun.rotation.x -= 0.15;
 setTimeout(()=>gun.rotation.x += 0.15,100);

 setTimeout(()=>{
   canShoot=true;
   status="READY";
 },reloadTime);
});

// ===== ENEMY AI =====
function enemyAI(){
 enemies.forEach(e=>{
   let dir=new THREE.Vector3().subVectors(camera.position,e.position).normalize();
   e.position.add(dir.multiplyScalar(e.speed));

   let dist=camera.position.distanceTo(e.position);
   if(dist<2) health-=0.5;
 });
}

// ===== MOVEMENT =====
function movement(){
 let speed=keys["Shift"]?0.25:0.12;

 velocity.x*=0.8;
 velocity.z*=0.8;

 if(keys["w"]) velocity.z -= speed;
 if(keys["s"]) velocity.z += speed;
 if(keys["a"]) velocity.x -= speed;
 if(keys["d"]) velocity.x += speed;

 controls.moveRight(velocity.x);
 controls.moveForward(velocity.z);

 // jump
 if(keys[" "] && onGround){
   velocityY=0.25;
   onGround=false;
 }
 velocityY -= 0.015;
 camera.position.y += velocityY;

 if(camera.position.y<1.6){
   camera.position.y=1.6;
   velocityY=0;
   onGround=true;
 }
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 movement();
 enemyAI();

 ui.innerHTML=`❤️ ${Math.floor(health)} | 🎯 ${score} | 🔫 ${status}`;

 if(health<=0){
   alert("GAME OVER | SCORE: "+score);
   location.reload();
 }

 renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
