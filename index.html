<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASH - PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,html{
  height:100%;
  font-family:'Poppins',sans-serif;
  color:#fff;
  overflow:hidden;
}

/* 🎥 Background */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{
  height:100%;
  overflow-y:auto;
  display:flex;
  justify-content:center;
  padding:60px 20px;
}

.card{
  max-width:850px;
  width:100%;
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  padding:40px;
  backdrop-filter:blur(15px);
  text-align:center;
}

/* 🎧 PLAYER */
.music-box{
  margin-top:30px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

.cover{
  width:120px;
  height:120px;
  border-radius:15px;
  object-fit:cover;
  margin-bottom:10px;
}

.song-name{
  color:#ccc;
  font-size:14px;
  margin-bottom:10px;
}

#visualizer{
  width:100%;
  height:60px;
}

.progress{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#00c6ff;
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#aaa;
}

.play-btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00c6ff;
  color:white;
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<audio id="bgMusic" loop>
  <source src="song.mp3">
</audio>

<div class="container">
<div class="card">

<h1>YASH</h1>
<p>16-year-old student from India 🇮🇳</p>

<a href="https://t.me/YAsHSTARK_18">Contact Me</a>

<!-- 🎧 PLAYER -->
<div class="music-box">

<img src="cover.jpg" class="cover">

<p class="song-name">🎧 Playing: Bairan</p>

<canvas id="visualizer"></canvas>

<div class="progress" onclick="seek(event)">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="time">
  <span id="current">0:00</span>
  <span id="duration">0:00</span>
</div>

<button class="play-btn" onclick="toggleMusic()" id="playBtn">⏸</button>

</div>

</div>
</div>

<script>
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("playBtn");
const progress = document.getElementById("progressBar");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

// autoplay fix
audio.play().catch(()=>{
  document.addEventListener("click", ()=>audio.play(), {once:true});
});

// ▶️ play pause
function toggleMusic(){
  if(audio.paused){
    audio.play();
    btn.innerText="⏸";
  } else {
    audio.pause();
    btn.innerText="▶";
  }
}

// ⏱ progress
audio.addEventListener("timeupdate", ()=>{
  let percent=(audio.currentTime/audio.duration)*100;
  progress.style.width=percent+"%";
  current.innerText=format(audio.currentTime);
  duration.innerText=format(audio.duration);
});

function format(t){
  if(!t) return "0:00";
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  return m+":"+(s<10?"0"+s:s);
}

// 🎯 seek
function seek(e){
  let rect=e.currentTarget.getBoundingClientRect();
  let x=e.clientX-rect.left;
  audio.currentTime=(x/rect.width)*audio.duration;
}

// 🌊 visualizer
const canvas=document.getElementById("visualizer");
const ctx=canvas.getContext("2d");

let audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let analyser=audioCtx.createAnalyser();
let source=audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize=64;
let data=new Uint8Array(analyser.frequencyBinCount);

canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;

function draw(){
  requestAnimationFrame(draw);
  analyser.getByteFrequencyData(data);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let w=canvas.width/data.length;

  for(let i=0;i<data.length;i++){
    let h=data[i]/2;
    ctx.fillStyle="#00c6ff";
    ctx.fillRect(i*w,canvas.height-h,w-2,h);
  }
}
draw();
</script>

</body>
</html>
