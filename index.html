<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASH - PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,html{
  height:100%;
  font-family:'Poppins',sans-serif;
  color:#fff;
  overflow:hidden;
}

/* 🎥 Background */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{
  height:100%;
  overflow-y:auto;
  display:flex;
  justify-content:center;
  padding:60px 20px;
}

.card{
  max-width:850px;
  width:100%;
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  padding:40px;
  backdrop-filter:blur(15px);
  text-align:center;
}

/* PROFILE */
.profile{
  width:150px;
  height:150px;
  border-radius:50%;
  border:3px solid #fff;
  object-fit:cover;
  margin-bottom:20px;
}

h1{font-size:2.8em;margin-bottom:10px;}

p{color:#ddd;}

/* SECTIONS */
.section{margin-top:30px;text-align:left;}
.section h2{border-bottom:1px solid #fff;margin-bottom:10px;}
.section ul{list-style:none;}
.section li{margin-bottom:6px;}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 30px;
  border-radius:50px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  text-decoration:none;
}

/* 🎧 PLAYER */
.music-box{
  margin-top:40px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

.cover{
  width:120px;
  height:120px;
  border-radius:15px;
}

.song-name{margin-top:10px;color:#ccc;}

.progress{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#00c6ff;
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#aaa;
}

.play-btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00c6ff;
  color:white;
}

/* 🎵 LYRICS */
.lyrics{
  margin-top:15px;
  font-size:16px;
  color:#aaa;
}

.active{
  color:#00c6ff;
  font-weight:bold;
  text-shadow:0 0 10px #00c6ff;
}

footer{
  margin-top:40px;
  color:#aaa;
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<audio id="bgMusic" loop>
  <source src="song.mp3">
</audio>

<div class="container">
<div class="card">

<img src="file.png" class="profile">

<h1>YASH</h1>

<p>Hi! I'm Yash — 16 years old school student from India 🇮🇳</p>

<div class="section">
<h2>About Me</h2>
<ul>
<li>Country: India</li>
<li>Age: 16</li>
<li>Student</li>
</ul>
</div>

<div class="section">
<h2>Skills</h2>
<ul>
<li>Creative Thinking</li>
<li>Problem Solving</li>
<li>Self Growth</li>
</ul>
</div>

<a href="https://t.me/YAsHSTARK_18" class="btn">Contact Me</a>

<!-- 🎧 PLAYER (NICHE ADD KIYA) -->
<div class="music-box">

<img src="cover.jpg" class="cover">

<p class="song-name">🎧 Playing: Bairan</p>

<div class="progress" onclick="seek(event)">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="time">
  <span id="current">0:00</span>
  <span id="duration">0:00</span>
</div>

<button class="play-btn" onclick="toggleMusic()" id="playBtn">⏸</button>

<!-- 🎵 LYRICS -->
<div id="lyrics" class="lyrics"></div>

</div>

<footer>
Made by Yash ⚡
</footer>

</div>
</div>

<script>
const audio=document.getElementById("bgMusic");
const btn=document.getElementById("playBtn");
const progress=document.getElementById("progressBar");
const current=document.getElementById("current");
const duration=document.getElementById("duration");
const lyricsBox=document.getElementById("lyrics");

audio.play().catch(()=>{
  document.addEventListener("click",()=>audio.play(),{once:true});
});

// toggle
function toggleMusic(){
  if(audio.paused){
    audio.play(); btn.innerText="⏸";
  } else {
    audio.pause(); btn.innerText="▶";
  }
}

// progress
audio.addEventListener("timeupdate",()=>{
  let p=(audio.currentTime/audio.duration)*100;
  progress.style.width=p+"%";
  current.innerText=format(audio.currentTime);
  duration.innerText=format(audio.duration);
  updateLyrics(audio.currentTime);
});

function format(t){
  if(!t) return "0:00";
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  return m+":"+(s<10?"0"+s:s);
}

// seek
function seek(e){
  let r=e.currentTarget.getBoundingClientRect();
  let x=e.clientX-r.left;
  audio.currentTime=(x/r.width)*audio.duration;
}

/* 🔥 SYNC LYRICS */
const lyrics = [
{time:0,text:"🎶 Bairan"},
{time:5,text:"Tere bina dil kahin na lage"},
{time:10,text:"Raaton me tera hi khayal jage"},
{time:15,text:"Saanson me basi hai teri baatein"},
{time:20,text:"Dil ye pukare tu hi tu aake"},
{time:25,text:"Bairan si yaadein sataaye mujhe"},
{time:30,text:"Har pal tera ehsaas dilaye mujhe"}
];

function updateLyrics(time){
  let line="";
  for(let i=0;i<lyrics.length;i++){
    if(time>=lyrics[i].time){
      line=lyrics[i].text;
    }
  }
  lyricsBox.innerHTML=`<span class="active">${line}</span>`;
}
</script>

</body>
</html>
