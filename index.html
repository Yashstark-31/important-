<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASH - LEGEND PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
  cursor:none;
}

/* 🔥 LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-size:2em;
  letter-spacing:2px;
  animation:fadeOut 2s forwards 2s;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden}
}

/* 🎯 CUSTOM CURSOR */
.cursor{
  width:20px;height:20px;
  border:2px solid #00c6ff;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* 🎥 VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-3;
}

/* 🌌 PARTICLES */
canvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* 🌑 OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* 💎 CARD */
.container{
  display:flex;
  justify-content:center;
  padding:60px 15px;
  height:100vh;
  overflow-y:auto;
}

.card{
  max-width:900px;
  width:100%;
  padding:40px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  text-align:center;
  box-shadow:0 0 40px rgba(0,198,255,0.4);
}

/* 🧑 IMAGE */
img{
  width:150px;height:150px;
  border-radius:50%;
  border:3px solid #00c6ff;
  transition:0.4s;
}
img:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px #00c6ff;
}

/* 🔥 TEXT */
h1{font-size:2.8em;margin-top:10px}
p{color:#ccc;margin-top:10px}

/* ⌨️ TYPING */
#typing{color:#00c6ff;font-weight:bold}

/* 🔘 BTN */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 30px;
  border-radius:50px;
  text-decoration:none;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
}

/* 📌 FOOTER */
footer{margin-top:20px;color:#888}
</style>
</head>

<body>

<div id="loader">Loading Yash...</div>

<div class="cursor" id="cursor"></div>

<video autoplay muted loop>
<source src="bg.mp4">
</video>

<canvas id="canvas"></canvas>
<div class="overlay"></div>

<div class="container">
<div class="card">

<img src="file.png">

<h1>YASH</h1>
<p id="typing"></p>

<p>16 | India 🇮🇳 | School Student</p>

<a href="https://t.me/YAsHSTARK_18" class="btn">Contact Me</a>

<footer>Built by Yash ⚡</footer>

</div>
</div>

<script>
/* ⌨️ TYPING */
let txt="Silent moves... Big dreams...";
let i=0;
function type(){
 if(i<txt.length){
  document.getElementById("typing").innerHTML+=txt.charAt(i);
  i++;
  setTimeout(type,60);
 }
}
type();

/* 🎯 CURSOR */
let cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
 cursor.style.top=e.clientY+"px";
 cursor.style.left=e.clientX+"px";
});

/* 🌌 PARTICLES */
let c=document.getElementById("canvas");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
for(let i=0;i<100;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 p.forEach(a=>{
  ctx.beginPath();
  ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
  ctx.fillStyle="#00c6ff";
  ctx.fill();
 });
 requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
